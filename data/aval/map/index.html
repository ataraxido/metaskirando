<!DOCTYPE html>
<html>
<head>
	
	<title>Risque avalancheux</title>

	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css" integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAacEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ==" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js" integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw==" crossorigin=""></script>


	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		#map {
			width: 800px;
			height: 600px;
		}
	</style>

	
</head>
<body>

<div id='map'></div>
<script src="Massifs.js" type="text/javascript"></script>
<script>

	var map = L.map('map').setView([44.5, 4], 6);

	L.tileLayer('http://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png?', {
		maxZoom: 9,
		attribution: 'Map data &copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors, ' +
			'<a href="http://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, ' +
			'Imagery © <a href="http://mapbox.com">Mapbox</a>',
		id: 'mapbox.light'
	}).addTo(map);
	
	function onEachFeature(feature, layer) {
		var popupContent = "<p><b>Massif: " +
				feature.properties.Nom + "</b><br>" + "Risque " + feature.properties.Risk + "<br>" + "<a id=" + '"exitLink"'+ 'class="btn btn-default btn-sm" target="_blank" href="' + feature.properties.lien + '">lien</a></p>'
		if (feature.properties && feature.properties.popupContent) {
			popupContent += feature.properties.popupContent;
		}
		layer.bindPopup(popupContent);
		layer.bindTooltip(feature.properties.Nom);
		
	}
	

	L.geoJson(avalanches, {
	style: function(feature) {
    switch (feature.properties.Risk) {
        case '1': return {color: "#00FF00", fillOpacity: 0.65, weight: 0, clickable: true};
        case '2': return {color: "#FFFF00", fillOpacity: 0.65, weight: 0, clickable: true};
		case '3': return {color: "#FF4500", fillOpacity: 0.65, weight: 0, clickable: true};
		case '4': return {color: "#FF0000", fillOpacity: 0.65, weight: 0, clickable: true};
		case '5': return {color: "#6B0D0D", fillOpacity: 0.65, weight: 0, clickable: true};
	 	}
		},
		onEachFeature: onEachFeature,
	}).addTo(map);

	L.geoJson(avalanches, {
	style: function (feature) {
        return {
            color: "gray",
            weight: 1,
            fill: false,
            clickable: true
        }
		}
    }).addTo(map);
	
</script>



</body>
</html>
